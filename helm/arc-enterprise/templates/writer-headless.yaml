apiVersion: v1
kind: Service
metadata:
  name: {{ include "arc-enterprise.writerHeadlessName" . }}
  labels:
    {{- include "arc-enterprise.roleLabels" (dict "ctx" . "role" "writer") | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8000
    - name: coordinator
      port: 9100
    - name: raft
      port: 9200
  selector:
    {{- include "arc-enterprise.roleSelectorLabels" (dict "ctx" . "role" "writer") | nindent 4 }}
