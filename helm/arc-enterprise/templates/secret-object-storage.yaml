{{- /*
  External object-storage credentials (S3/Azure) — only created when:
    - storage.mode=shared
    - storage.shared.external=true
    - storage.shared.credentials.existingSecret is empty
    - storage.shared.credentials.accessKey is set
  For bundled MinIO, arc-enterprise.objectStorageSecretName resolves to the
  MinIO Secret, so no additional Secret is created here.
*/ -}}
{{- if and
  (eq .Values.storage.mode "shared")
  .Values.storage.shared.external
  (not .Values.storage.shared.credentials.existingSecret)
  .Values.storage.shared.credentials.accessKey
}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-enterprise.objectStorageSecretName" . }}
  labels:
    {{- include "arc-enterprise.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.storage.shared.credentials.accessKey | quote }}
  secret-key: {{ .Values.storage.shared.credentials.secretKey | quote }}
{{- end }}
