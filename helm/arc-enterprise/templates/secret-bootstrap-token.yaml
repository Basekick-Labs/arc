{{- if and (not .Values.auth.bootstrapToken.existingSecret) .Values.auth.bootstrapToken.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-enterprise.bootstrapTokenSecretName" . }}
  labels:
    {{- include "arc-enterprise.labels" . | nindent 4 }}
type: Opaque
stringData:
  bootstrap-token: {{ .Values.auth.bootstrapToken.value | quote }}
{{- end }}
