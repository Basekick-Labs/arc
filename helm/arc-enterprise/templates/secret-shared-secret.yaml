{{- if and (not .Values.cluster.sharedSecret.existingSecret) .Values.cluster.sharedSecret.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-enterprise.sharedSecretName" . }}
  labels:
    {{- include "arc-enterprise.labels" . | nindent 4 }}
type: Opaque
stringData:
  shared-secret: {{ .Values.cluster.sharedSecret.value | quote }}
{{- else if and (not .Values.cluster.sharedSecret.existingSecret) (not .Values.cluster.sharedSecret.value) }}
{{- fail "cluster.sharedSecret.value is required (or set cluster.sharedSecret.existingSecret)" }}
{{- end }}
{{- if and (not .Values.license.existingSecret) (not .Values.license.key) }}
{{- fail "license.key is required (or set license.existingSecret)" }}
{{- end }}
