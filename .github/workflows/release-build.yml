name: Release Build

on:
  push:
    branches:
      - 'release/*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 25.11.1)'
        required: true
        type: string
      test_mode:
        description: 'Test mode: push version/short tags only, NOT latest (use for CI verification so a test run cannot clobber the real latest tag)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write   # required for OIDC keyless signing via Sigstore/cosign

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: basekick-labs/arc
  # Docker Hub mirror — published alongside GHCR on every release.
  # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN are repo secrets (the token is a
  # Docker Hub access token, not the account password).
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME_DOCKERHUB: basekicklabs/arc

jobs:
  # Extract version from branch name or input
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_version: ${{ steps.version.outputs.short_version }}
      test_mode: ${{ steps.version.outputs.test_mode }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Extract from branch name: release/25.11.1 -> 25.11.1
            VERSION="${GITHUB_REF#refs/heads/release/}"
          fi

          # Validate version format (YY.MM.PATCH)
          if ! [[ "$VERSION" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected: YY.MM.PATCH)"
            exit 1
          fi

          # Extract short version (25.11)
          SHORT_VERSION="${VERSION%.*}"

          # test_mode (workflow_dispatch only) suppresses the `latest`
          # tag so a CI verification run cannot overwrite the real
          # latest on either registry. Branch-push releases are never
          # test mode.
          TEST_MODE="${{ inputs.test_mode }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            TEST_MODE="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
          echo "test_mode=$TEST_MODE" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION (test_mode=$TEST_MODE)" >> $GITHUB_STEP_SUMMARY

  # Build and push Docker multi-arch images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.short_version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.test_mode != 'true' }}

      # GHCR uses the digest-and-merge pattern: each platform pushes its
      # image by digest, and docker-merge combines them into a multi-arch
      # manifest. GHCR's package UI indexes these registry-API pushes
      # correctly. (Docker Hub does NOT — its Tags page only indexes the
      # standard buildx --push path — so Docker Hub is handled separately
      # in the docker-build-dockerhub job below, not here.)
      - name: Build and push by digest (GHCR)
        id: build_ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build_ghcr.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Docker Hub gets a single multi-platform `buildx --push` (not the
  # digest-and-merge pattern). imagetools/digest-merge pushes via the
  # registry manifest API, which Docker Hub's Tags page does NOT index —
  # the image is pullable but the Tags listing stays empty. A direct
  # multi-platform build-push goes through the path Hub's UI indexes, so
  # the published tags actually show up. Layers come from the same gha
  # cache the GHCR build populated, so this is mostly cache-hit + push.
  docker-build-dockerhub:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME_DOCKERHUB }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.short_version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.test_mode != 'true' }}

      - name: Build and push (multi-platform, direct)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Summary
        run: |
          echo "✅ Docker Hub multi-arch image pushed via direct buildx --push" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/  - /' >> $GITHUB_STEP_SUMMARY

  # Build Go binaries using native runners (CGO required for SQLite)
  build-binaries:
    name: Build Binaries
    needs: prepare
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: linux-amd64
          - runner: ubuntu-24.04-arm
            suffix: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Build binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          go build -tags=duckdb_arrow \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o arc-${{ matrix.suffix }} \
            ./cmd/arc

          chmod +x arc-${{ matrix.suffix }}

          # Show binary info
          file arc-${{ matrix.suffix }}
          ls -lh arc-${{ matrix.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the binary blob with keyless OIDC signing. The .bundle file
      # contains the signature + Rekor transparency-log entry and is shipped
      # as a release artifact so air-gapped/Zarf deployments can verify
      # offline with: cosign verify-blob arc-linux-amd64 --bundle arc-linux-amd64.bundle
      - name: Sign binary (keyless)
        run: |
          cosign sign-blob --yes \
            arc-${{ matrix.suffix }} \
            --bundle arc-${{ matrix.suffix }}.bundle
          echo "✅ Binary signed: arc-${{ matrix.suffix }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload binary and signature bundle
        uses: actions/upload-artifact@v6
        with:
          name: arc-binary-${{ matrix.suffix }}
          path: |
            arc-${{ matrix.suffix }}
            arc-${{ matrix.suffix }}.bundle
          retention-days: 7

  # Aggregate binary hashes for SLSA provenance — must run after both
  # matrix legs of build-binaries complete so we can combine both digests
  # into a single base64-subjects string for the generator.
  hash-binaries:
    name: Hash Binaries for SLSA
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          pattern: arc-binary-*
          merge-multiple: true
          path: ./binaries

      - name: Compute SHA-256 subjects
        id: hash
        run: |
          cd binaries
          # Compute sha256 for each binary (exclude .bundle sidecar files)
          sha256sum arc-linux-amd64 arc-linux-arm64 > sha256sums.txt
          cat sha256sums.txt
          # SLSA generator expects base64-encoded "HASH  filename\n..." lines (sha256sum format)
          HASHES=$(base64 -w0 sha256sums.txt)
          echo "hashes=${HASHES}" >> $GITHUB_OUTPUT

  # Build Debian packages
  debian-build:
    name: Build Debian Package
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    strategy:
      matrix:
        include:
          - arch: amd64
            binary_suffix: linux-amd64
          - arch: arm64
            binary_suffix: linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: arc-binary-${{ matrix.binary_suffix }}

      - name: Build Debian package
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          ARCH=${{ matrix.arch }}

          # Create package directory structure
          PKG_DIR="arc_${VERSION}_${ARCH}"
          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/usr/bin
          mkdir -p ${PKG_DIR}/etc/arc
          mkdir -p ${PKG_DIR}/lib/systemd/system
          mkdir -p ${PKG_DIR}/var/lib/arc

          # Copy binary
          cp arc-${{ matrix.binary_suffix }} ${PKG_DIR}/usr/bin/arc
          chmod +x ${PKG_DIR}/usr/bin/arc

          # Copy config
          cp arc.toml ${PKG_DIR}/etc/arc/arc.toml

          # Create systemd service
          cat > ${PKG_DIR}/lib/systemd/system/arc.service << 'SERVICE'
          [Unit]
          Description=Arc Time-Series Database
          After=network.target

          [Service]
          Type=simple
          User=arc
          Group=arc
          ExecStart=/usr/bin/arc
          WorkingDirectory=/var/lib/arc
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65535

          # Environment
          Environment="ARC_STORAGE_LOCAL_PATH=/var/lib/arc/data"

          [Install]
          WantedBy=multi-user.target
          SERVICE

          # Create control file
          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: arc
          Version: ${VERSION}
          Section: database
          Priority: optional
          Architecture: ${ARCH}
          Depends: libc6
          Maintainer: Basekick Labs <contact@basekick.com>
          Description: Arc - High-Performance Time-Series Database
           Arc is a high-performance time-series database built on DuckDB,
           optimized for IoT, observability, and analytics workloads.
           .
           Features: 9.47M records/sec ingestion, DuckDB SQL queries,
           Parquet storage, S3/MinIO support.
          Homepage: https://github.com/basekick-labs/arc
          EOF

          # Create postinst script
          cat > ${PKG_DIR}/DEBIAN/postinst << 'POSTINST'
          #!/bin/bash
          set -e

          # Create arc user if not exists
          if ! id -u arc > /dev/null 2>&1; then
            useradd --system --home-dir /var/lib/arc --no-create-home --shell /bin/false arc
          fi

          # Set ownership
          chown -R arc:arc /var/lib/arc
          chown arc:arc /etc/arc/arc.toml

          # Reload systemd
          if command -v systemctl >/dev/null 2>&1; then
            systemctl daemon-reload
            echo ""
            echo "Arc installed successfully!"
            echo "  Start:  sudo systemctl start arc"
            echo "  Enable: sudo systemctl enable arc"
            echo "  Logs:   sudo journalctl -u arc -f"
          fi
          POSTINST
          chmod +x ${PKG_DIR}/DEBIAN/postinst

          # Create prerm script
          cat > ${PKG_DIR}/DEBIAN/prerm << 'PRERM'
          #!/bin/bash
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop arc.service || true
            systemctl disable arc.service || true
          fi
          PRERM
          chmod +x ${PKG_DIR}/DEBIAN/prerm

          # Build package
          dpkg-deb --build ${PKG_DIR}

          # Create checksum
          sha256sum ${PKG_DIR}.deb > ${PKG_DIR}.deb.sha256

      - name: Upload Debian package
        uses: actions/upload-artifact@v6
        with:
          name: arc-debian-${{ matrix.arch }}-${{ needs.prepare.outputs.version }}
          path: |
            *.deb
            *.deb.sha256
          retention-days: 7

  # Build RPM packages
  rpm-build:
    name: Build RPM Package
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    strategy:
      matrix:
        include:
          - arch: x86_64
            binary_suffix: linux-amd64
          - arch: aarch64
            binary_suffix: linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install RPM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: arc-binary-${{ matrix.binary_suffix }}

      - name: Build RPM package
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          ARCH=${{ matrix.arch }}

          # Create RPM build structure
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create source tarball
          mkdir -p arc-${VERSION}
          cp arc-${{ matrix.binary_suffix }} arc-${VERSION}/arc
          chmod +x arc-${VERSION}/arc
          cp arc.toml arc-${VERSION}/
          tar -czf ~/rpmbuild/SOURCES/arc-${VERSION}.tar.gz arc-${VERSION}

          # Create systemd service in SOURCES
          cat > ~/rpmbuild/SOURCES/arc.service << 'SERVICE'
          [Unit]
          Description=Arc Time-Series Database
          After=network.target

          [Service]
          Type=simple
          User=arc
          Group=arc
          ExecStart=/usr/bin/arc
          WorkingDirectory=/var/lib/arc
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65535
          Environment="ARC_STORAGE_LOCAL_PATH=/var/lib/arc/data"

          [Install]
          WantedBy=multi-user.target
          SERVICE

          # Create spec file
          cat > ~/rpmbuild/SPECS/arc.spec << EOF
          Name:           arc
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        High-Performance Time-Series Database
          License:        AGPL-3.0
          URL:            https://github.com/basekick-labs/arc
          Source0:        arc-${VERSION}.tar.gz
          Source1:        arc.service

          %description
          Arc is a high-performance time-series database built on DuckDB,
          optimized for IoT, observability, and analytics workloads.

          Features: 9.47M records/sec ingestion, DuckDB SQL queries,
          Parquet storage, S3/MinIO support.

          %prep
          %setup -q

          %install
          rm -rf %{buildroot}
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/etc/arc
          mkdir -p %{buildroot}/lib/systemd/system
          mkdir -p %{buildroot}/var/lib/arc

          install -m 755 arc %{buildroot}/usr/bin/arc
          install -m 644 arc.toml %{buildroot}/etc/arc/arc.toml
          install -m 644 %{SOURCE1} %{buildroot}/lib/systemd/system/arc.service

          %files
          %attr(755, root, root) /usr/bin/arc
          %config(noreplace) /etc/arc/arc.toml
          /lib/systemd/system/arc.service
          %dir %attr(755, arc, arc) /var/lib/arc

          %pre
          # Create arc user
          if ! id -u arc > /dev/null 2>&1; then
            useradd --system --home-dir /var/lib/arc --no-create-home --shell /sbin/nologin arc
          fi

          %post
          systemctl daemon-reload
          echo ""
          echo "Arc installed successfully!"
          echo "  Start:  sudo systemctl start arc"
          echo "  Enable: sudo systemctl enable arc"
          echo "  Logs:   sudo journalctl -u arc -f"

          %preun
          systemctl stop arc.service || true
          systemctl disable arc.service || true

          %changelog
          * $(date "+%a %b %d %Y") Basekick Labs <contact@basekick.com> - ${VERSION}-1
          - Release ${VERSION}
          EOF

          # Build RPM
          rpmbuild -ba --target ${ARCH} ~/rpmbuild/SPECS/arc.spec

          # Copy to current directory
          cp ~/rpmbuild/RPMS/${ARCH}/arc-${VERSION}-1.*.rpm .

          # Create checksum
          sha256sum arc-${VERSION}-1.*.rpm > arc-${VERSION}-1.${ARCH}.rpm.sha256

      - name: Upload RPM package
        uses: actions/upload-artifact@v6
        with:
          name: arc-rpm-${{ matrix.arch }}-${{ needs.prepare.outputs.version }}
          path: |
            *.rpm
            *.rpm.sha256
          retention-days: 7

  # Merge multi-arch manifests
  docker-merge:
    name: Merge Docker Manifests
    runs-on: ubuntu-latest
    needs: [prepare, docker-build]
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless signing of the manifest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push (GHCR)
        id: manifest
        working-directory: /tmp/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_VERSION: ${{ needs.prepare.outputs.short_version }}
          TEST_MODE: ${{ needs.prepare.outputs.test_mode }}
        run: |
          # Multi-arch manifest with version + short_version, plus latest
          # unless this is a test_mode run (which must not clobber latest).
          # Docker Hub is published separately (docker-build-dockerhub) via
          # a direct buildx --push so its Tags UI indexes the release.
          TAGS=( -t "${IMAGE_REF}:${VERSION}" -t "${IMAGE_REF}:${SHORT_VERSION}" )
          if [ "${TEST_MODE}" != "true" ]; then
            TAGS+=( -t "${IMAGE_REF}:latest" )
          fi
          docker buildx imagetools create \
            "${TAGS[@]}" \
            $(printf "${IMAGE_REF}@sha256:%s " *)

          LATEST_NOTE="latest"
          [ "${TEST_MODE}" = "true" ] && LATEST_NOTE="(latest suppressed — test_mode)"
          echo "✅ GHCR multi-arch manifest pushed" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${VERSION}, ${SHORT_VERSION}, ${LATEST_NOTE}" >> $GITHUB_STEP_SUMMARY

          # Capture the versioned manifest digest for cosign to sign below.
          DIGEST=$(docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "manifest_digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the multi-arch manifest digest with keyless OIDC signing.
      # The signature is anchored in the Rekor transparency log — verifiers
      # can check: "this image was built by this Actions workflow from this
      # commit." No key material is stored; the GitHub Actions OIDC token is
      # the identity. Air-gap deployments can verify offline once the bundle
      # is fetched from Rekor before the network is severed.
      - name: Sign container image (keyless)
        env:
          IMAGE_REF: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          MANIFEST_DIGEST: ${{ steps.manifest.outputs.manifest_digest }}
        run: |
          cosign sign --yes "${IMAGE_REF}@${MANIFEST_DIGEST}"
          echo "✅ Container image signed: ${IMAGE_REF}@${MANIFEST_DIGEST}" >> $GITHUB_STEP_SUMMARY

  # Generate SLSA Level 3 provenance for the release binaries.
  # Provenance proves: who built it, from what source commit, with what build
  # inputs — the highest attestation level achievable on GitHub Actions without
  # hardware HSMs. Verifiable with:
  #   slsa-verifier verify-artifact arc-linux-amd64 \
  #     --provenance-path arc-linux-amd64.intoto.jsonl \
  #     --source-uri github.com/basekick-labs/arc
  provenance:
    needs: [prepare, hash-binaries]
    permissions:
      actions: read
      id-token: write
      contents: write
    # Pinned by commit SHA (tag v2.1.0) — tags are mutable, SHAs are not.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects: ${{ needs.hash-binaries.outputs.hashes }}
      # upload-assets requires a tag ref with an existing GitHub release.
      # This workflow triggers on a branch (release/*); the release is created
      # by create-draft-release after provenance completes. Use artifact upload
      # instead so create-draft-release can attach the file to the release.
      upload-assets: false
      # provenance-name cannot use needs context inside a reusable workflow
      # with: block (GitHub limitation). The generator outputs multiple.intoto.jsonl
      # by default; create-draft-release renames it to arc-VERSION.intoto.jsonl.

  # Scan container image for OS CVEs and Go module vulnerabilities.
  # exit-code: 0 — the deliverable is the signed scan report attached to the
  # GitHub release, not "zero findings." Primes need evidence, not a blocked
  # pipeline over transitive Debian CVEs we don't control.
  vuln-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [prepare, docker-merge]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (SARIF — uploads to GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy (JSON — release artifact)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
          format: json
          output: arc-${{ needs.prepare.outputs.version }}-trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy report
        uses: actions/upload-artifact@v6
        with:
          name: arc-trivy-${{ needs.prepare.outputs.version }}
          path: arc-${{ needs.prepare.outputs.version }}-trivy-report.json
          retention-days: 7

      - name: Summary
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          echo "## Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy report: \`arc-${VERSION}-trivy-report.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- SARIF uploaded to GitHub Security tab" >> $GITHUB_STEP_SUMMARY

  # Generate SBOM artifacts for supply-chain compliance (EO 14028 / SLSA)
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [prepare, docker-merge]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Container SBOM: catches DuckDB native libs, libsqlite3, and all Debian
      # packages in the runtime image — the layer primes' tools actually scan.
      - name: Generate container SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
          artifact-name: arc-${{ needs.prepare.outputs.version }}-sbom-container.spdx.json
          output-file: arc-${{ needs.prepare.outputs.version }}-sbom-container.spdx.json
          format: spdx-json

      # Source SBOM: Go module graph — complements the container scan by naming
      # every Go dependency with its exact version and license expression.
      - name: Generate source SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: arc-${{ needs.prepare.outputs.version }}-sbom-source.cyclonedx.json
          output-file: arc-${{ needs.prepare.outputs.version }}-sbom-source.cyclonedx.json
          format: cyclonedx-json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: arc-sbom-${{ needs.prepare.outputs.version }}
          path: |
            arc-${{ needs.prepare.outputs.version }}-sbom-container.spdx.json
            arc-${{ needs.prepare.outputs.version }}-sbom-source.cyclonedx.json
          retention-days: 7

      - name: Summary
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          echo "## SBOM Generated" >> $GITHUB_STEP_SUMMARY
          echo "- \`arc-${VERSION}-sbom-container.spdx.json\` — container image (SPDX)" >> $GITHUB_STEP_SUMMARY
          echo "- \`arc-${VERSION}-sbom-source.cyclonedx.json\` — Go module graph (CycloneDX)" >> $GITHUB_STEP_SUMMARY

  # Test Docker image health
  test-docker:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, docker-merge]
    steps:
      - name: Pull and run Docker image
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          IMAGE="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${VERSION}"

          echo "Pulling image: ${IMAGE}"
          docker pull ${IMAGE}

          echo "Starting Arc container..."
          docker run -d --name arc-test -p 8000:8000 ${IMAGE}

          # Wait for startup
          echo "Waiting for Arc to start..."
          sleep 10

          # Test health endpoint
          echo "Testing health endpoint..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "✅ Health check passed!"
              docker logs arc-test
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

          echo "❌ Health check failed after 60 seconds"
          docker logs arc-test
          exit 1

      - name: Test version endpoint
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          # Check if version endpoint returns expected version
          RESPONSE=$(curl -sf http://localhost:8000/health || echo "{}")
          echo "Health response: ${RESPONSE}"

          # Verify version is not "dev"
          if echo "${RESPONSE}" | grep -q '"version"'; then
            echo "✅ Version info present in health response"
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop arc-test || true
          docker rm arc-test || true

  # Test binary execution
  test-binary:
    name: Test Binary
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    steps:
      - name: Download amd64 binary
        uses: actions/download-artifact@v7
        with:
          name: arc-binary-linux-amd64

      - name: Test binary execution
        run: |
          chmod +x arc-linux-amd64

          # Test --version or basic startup
          echo "Testing binary execution..."

          # Start Arc in background
          ./arc-linux-amd64 &
          ARC_PID=$!

          # Wait for startup
          sleep 5

          # Test health endpoint
          echo "Testing health endpoint..."
          for i in {1..20}; do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "✅ Binary health check passed!"
              kill $ARC_PID || true
              exit 0
            fi
            echo "Attempt $i/20 - waiting..."
            sleep 2
          done

          echo "❌ Binary health check failed"
          kill $ARC_PID || true
          exit 1

  # Package Helm chart
  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.13.0'

      - name: Package Helm chart
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          # Update Chart.yaml version
          sed -i "s/^version:.*/version: ${VERSION}/" helm/arc/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/arc/Chart.yaml

          # Package the chart
          helm package helm/arc --destination dist/

          # Create checksum
          cd dist
          sha256sum arc-${VERSION}.tgz > arc-${VERSION}.tgz.sha256

      - name: Upload Helm chart
        uses: actions/upload-artifact@v6
        with:
          name: arc-helm-${{ needs.prepare.outputs.version }}
          path: |
            dist/*.tgz
            dist/*.tgz.sha256
          retention-days: 7

  # Test Helm chart installation
  test-helm:
    name: Test Helm Chart
    runs-on: ubuntu-latest
    needs: [prepare, helm-package]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Helm chart
        uses: actions/download-artifact@v7
        with:
          name: arc-helm-${{ needs.prepare.outputs.version }}
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: local/arc:${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.13.0'

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: arc-test

      - name: Load image into kind
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          kind load docker-image local/arc:${VERSION} --name arc-test

      - name: Test Helm chart
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          # Install the chart with local image
          helm install arc-test dist/arc-${VERSION}.tgz \
            --set image.repository=local/arc \
            --set image.tag=${VERSION} \
            --set image.pullPolicy=Never \
            --set persistence.enabled=false \
            --wait --timeout=2m

          # Check if deployment is ready
          kubectl rollout status deployment/arc-test --timeout=2m

          # Check if pod is running
          kubectl get pods -l app.kubernetes.io/name=arc

          # Port forward and test health endpoint
          kubectl port-forward svc/arc-test 8000:8000 &
          PF_PID=$!
          sleep 5

          # Test health endpoint
          if curl -s http://localhost:8000/health > /dev/null 2>&1; then
            echo "✅ Helm chart deployed successfully and Arc is healthy!"
          else
            echo "❌ Arc health check failed"
            kubectl logs -l app.kubernetes.io/name=arc --tail=50
            exit 1
          fi

          kill $PF_PID || true

          # Cleanup
          helm uninstall arc-test

  # Create draft release
  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [prepare, docker-merge, docker-build-dockerhub, test-docker, test-binary, helm-package, test-helm, debian-build, rpm-build, sbom, vuln-scan, provenance]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: arc-*
          merge-multiple: true
          path: ./release-artifacts

      - name: Download SLSA provenance attestation
        uses: actions/download-artifact@v7
        with:
          name: multiple.intoto.jsonl
          path: ./release-artifacts

      - name: Rename provenance attestation
        run: |
          mv ./release-artifacts/multiple.intoto.jsonl \
             ./release-artifacts/arc-${{ needs.prepare.outputs.version }}.intoto.jsonl

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          cat > release-notes.md << 'EOF'
          # Arc v${{ needs.prepare.outputs.version }} - Go Implementation

          **Major Release: Complete rewrite from Python to Go**

          Arc is a high-performance time-series database built on DuckDB, optimized for IoT, observability, and analytics workloads.

          ## 🚀 Migration Highlights

          This release marks the complete migration from Python to Go, delivering:

          ### Performance Improvements
          - **9.47M records/sec** MessagePack ingestion (125% faster than Python's 4.21M)
          - **1.92M records/sec** Line Protocol ingestion (76% faster than Python's 1.09M)
          - **2.88M rows/sec** Arrow query throughput

          ### Reliability
          - **Memory stable**: No memory leaks (Python leaked 372MB per 500 queries)
          - **Single binary**: No Python dependencies, pip, or virtual environments
          - **Type-safe**: Strong typing catches bugs at compile time

          ### Full Feature Parity
          - ✅ Authentication (user/password)
          - ✅ Automatic Compaction (Parquet optimization)
          - ✅ Write-Ahead Log (WAL for durability)
          - ✅ Retention Policies (automatic data expiration)
          - ✅ Continuous Queries (real-time aggregations)
          - ✅ Delete API (selective data removal)
          - ✅ S3/MinIO storage backend
          - ✅ Arrow IPC query responses

          ## Quick Start

          ### Docker

          ```bash
          docker run -d \
            -p 8000:8000 \
            -v arc-data:/app/data \
            ghcr.io/basekick-labs/arc:${{ needs.prepare.outputs.version }}
          ```

          ### Debian/Ubuntu (amd64, arm64)

          ```bash
          # Download and install
          wget https://github.com/basekick-labs/arc/releases/download/v${{ needs.prepare.outputs.version }}/arc_${{ needs.prepare.outputs.version }}_amd64.deb
          sudo dpkg -i arc_${{ needs.prepare.outputs.version }}_amd64.deb

          # Start and enable
          sudo systemctl enable arc
          sudo systemctl start arc

          # Check status
          curl http://localhost:8000/health
          ```

          ### RHEL/Fedora/Rocky (x86_64, aarch64)

          ```bash
          # Download and install
          wget https://github.com/basekick-labs/arc/releases/download/v${{ needs.prepare.outputs.version }}/arc-${{ needs.prepare.outputs.version }}-1.x86_64.rpm
          sudo rpm -i arc-${{ needs.prepare.outputs.version }}-1.x86_64.rpm

          # Start and enable
          sudo systemctl enable arc
          sudo systemctl start arc
          ```

          ### Kubernetes (Helm)

          ```bash
          helm install arc https://github.com/basekick-labs/arc/releases/download/v${{ needs.prepare.outputs.version }}/arc-${{ needs.prepare.outputs.version }}.tgz
          ```

          ## Download Artifacts

          | Platform | Architecture | Package |
          |----------|--------------|---------|
          | Docker | amd64, arm64 | `ghcr.io/basekick-labs/arc:${{ needs.prepare.outputs.version }}` |
          | Debian/Ubuntu | amd64 | `arc_${{ needs.prepare.outputs.version }}_amd64.deb` |
          | Debian/Ubuntu | arm64 | `arc_${{ needs.prepare.outputs.version }}_arm64.deb` |
          | RHEL/Fedora | x86_64 | `arc-${{ needs.prepare.outputs.version }}-1.x86_64.rpm` |
          | RHEL/Fedora | aarch64 | `arc-${{ needs.prepare.outputs.version }}-1.aarch64.rpm` |
          | Kubernetes | - | `arc-${{ needs.prepare.outputs.version }}.tgz` (Helm) |

          ## Breaking Changes

          - **Python version**: The Python implementation is preserved in the `python-legacy` branch
          - **Configuration**: TOML config format (unchanged, but verify your `arc.toml`)

          ## Upgrading from Python

          1. Stop existing Arc service
          2. Backup your data directory
          3. Install the new Go binary (same config format)
          4. Start Arc - data is automatically migrated

          ## Documentation

          - [Full Documentation](https://docs.basekick.net/arc)
          - [Migration Guide](https://github.com/basekick-labs/arc/blob/main/MIGRATION_PLAN.md)

          ## Community

          - **Discord**: [Join](https://discord.gg/nxnWfUxsdm)
          - **Issues**: [GitHub](https://github.com/basekick-labs/arc/issues)
          EOF

          cat release-notes.md

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Arc ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*.tgz
            release-artifacts/**/*.tgz.sha256
            release-artifacts/**/*.deb
            release-artifacts/**/*.deb.sha256
            release-artifacts/**/*.rpm
            release-artifacts/**/*.rpm.sha256
            release-artifacts/**/*.spdx.json
            release-artifacts/**/*.cyclonedx.json
            release-artifacts/**/*-trivy-report.json
            release-artifacts/**/*.bundle
            release-artifacts/**/*.intoto.jsonl
            release-artifacts/**/*-linux-amd64
            release-artifacts/**/*-linux-arm64
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          echo "## 🎉 Draft Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: **${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Package |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | \`ghcr.io/basekick-labs/arc:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm | \`arc-${VERSION}.tgz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Debian amd64 | \`arc_${VERSION}_amd64.deb\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Debian arm64 | \`arc_${VERSION}_arm64.deb\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RPM x86_64 | \`arc-${VERSION}-1.x86_64.rpm\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RPM aarch64 | \`arc-${VERSION}-1.aarch64.rpm\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (container, SPDX) | \`arc-${VERSION}-sbom-container.spdx.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (source, CycloneDX) | \`arc-${VERSION}-sbom-source.cyclonedx.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability scan | \`arc-${VERSION}-trivy-report.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign bundles | \`arc-linux-amd64.bundle\`, \`arc-linux-arm64.bundle\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SLSA provenance | \`arc-${VERSION}.intoto.jsonl\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker image health check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Binary execution test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Helm chart deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review release notes" >> $GITHUB_STEP_SUMMARY
          echo "2. Publish when ready" >> $GITHUB_STEP_SUMMARY
